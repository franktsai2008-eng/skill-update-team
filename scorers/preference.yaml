# Scorer: Preference History
---
name: preference
description: 根據使用者歷史偏好調整分數
weight: 0.10
enabled: true

scoring_rules: |
  根據使用者過去的 approve/reject 記錄，透過 **tags 比對** 調整分數（0-1）：

  每筆偏好記錄都有 tags 欄位（如 ["browser", "testing", "automation"]）。
  計算新工具的 tags 與歷史記錄的重疊度：

  - tags 與過去 approve 的工具重疊 ≥ 2 個: 0.9
  - tags 與過去 approve 的工具重疊 1 個: 0.7
  - 無歷史參考（沒有 tags 匹配）: 0.5（中立）
  - tags 與過去 reject 的工具重疊 1 個: 0.3
  - tags 與過去 reject 的工具重疊 ≥ 2 個: 0.1

  偏好歷史會從 preferences.jsonl 注入，每筆含 tags 欄位。
  注意：最近 30 天的記錄權重 > 更早的記錄（偏好會變化）。
