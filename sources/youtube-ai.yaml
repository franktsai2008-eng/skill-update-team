# Source Adapter: YouTube AI Tool Reviews
---
name: youtube-ai
description: 從 YouTube 搜尋 Claude/MCP 工具介紹影片
enabled: true
tool: firecrawl_search
fallback: WebSearch
schedule: weekly  # YouTube 內容更新較慢，每週一次即可

queries_firecrawl:
  - "Claude Code MCP server tutorial site:youtube.com"
  - "Claude Code new tools 2026 site:youtube.com"
queries_websearch:
  - "Claude Code MCP server tutorial youtube 2026"
  - "Claude Code new tools youtube 2026"

extract_fields:
  - title
  - url
  - channel
  - view_count
  - mentioned_tools

instructions: |
  找出介紹 Claude Code / MCP 工具的 YouTube 影片。
  重點關注：有實際 demo 的影片（不只是概念介紹）。
  如果影片提到具體工具名稱和 GitHub URL，提取出來。
  觀看數 > 5000 的影片給予較高 community signal。
